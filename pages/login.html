<!DOCTYPE html>
<html>

<head>

<title>Login - GuiLab</title>

<link
rel="stylesheet"
href="styles.css">

</head>

<body>

<section class="login">

<h1>Entrar</h1>

<form id="login-form">

<input
type="email"
id="email"
placeholder="E-mail"
required>

<select id="tipo">

<option value="tutor">
Tutor
</option>

<option value="veterinario">
Veterinário
</option>

<option value="admin">
Administrador
</option>

</select>

<input
type="password"
id="senha"
placeholder="Senha"
required>

<button>

Entrar

</button>

</form>

</section>

<script src="login.js"></script>

</body>

</html>
